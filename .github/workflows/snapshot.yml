name: Publish Snapshot

on:
  push:
    branches: [main, 'release/*']
    tags-ignore: ['v*']

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Resolve snapshot version
        id: version
        run: |
          VERSION=$(grep '^version=' gradle.properties | cut -d= -f2)

          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Using version from gradle.properties: $VERSION"
          else
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION=${LAST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            SNAPSHOT="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
            echo "version=$SNAPSHOT" >> "$GITHUB_OUTPUT"
            echo "Derived from last tag: $SNAPSHOT"
          fi

      - name: Run quality checks
        run: ./gradlew quality --no-configuration-cache

      - name: Publish snapshot
        run: ./gradlew publish -Pversion=${{ steps.version.outputs.version }} --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
          CI: true
