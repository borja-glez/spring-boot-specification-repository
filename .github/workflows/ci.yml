name: CI

on:
  pull_request:

jobs:
  library-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify library quality
        run: ./gradlew quality

  compatibility:
    name: Compatibility (${{ matrix.boot-line }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        boot-line: [boot3, boot4]
    env:
      DOCKER_HOST: unix:///var/run/docker.sock
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Verify Boot 3 compatibility
        if: matrix.boot-line == 'boot3'
        run: ./gradlew verifyBoot3Compatibility
      - name: Verify Boot 4 compatibility
        if: matrix.boot-line == 'boot4'
        run: ./gradlew verifyBoot4Compatibility
